<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оплата успешна</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0f1c;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.card {
  background: #111827;
  padding: 40px;
  border-radius: 16px;
  max-width: 400px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}

.check {
  font-size: 50px;
  color: #22c55e;
}

h1 {
  margin-top: 10px;
}

p {
  color: #94a3b8;
  font-size: 14px;
}

a {
  display: inline-block;
  margin-top: 20px;
  color: #22c55e;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="card">
  <div class="check">✔️</div>
  <h1>Оплата прошла успешно</h1>
  <p>Чек отправлен на вашу почту</p>
  <a href="/">Вернуться назад</a>
</div>

</body>
</html>
