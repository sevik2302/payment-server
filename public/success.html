<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оплата успешна</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: #0b1220;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #e5e7eb;
    }

    .card {
      background: #111827;
      padding: 40px;

    }

    h1 {
      color: #22c55e;
    }

    p {
      color: #9ca3af;
      font-size: 14px;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 18px;
      background: #3b82f6;
      color: white;
      border-radius: 10px;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>✔️ Оплата прошла</h1>
    <p>Чек отправлен на почту</p>
    <a href="/">На главную</a>
  </div>

</body>
</html>
