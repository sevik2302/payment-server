<!DOCTYPE html>
<html>
<head>
  <title>Оплата</title>
</head>
<body>

<h2>Оплата</h2>

<input type="number" id="amount" placeholder="Введите сумму в рублях">
<button onclick="pay()">Оплатить</button>

<script>
  function pay() {
    const amount = document.getElementById("amount").value;

    if (!amount || amount <= 0) {
      alert("Введите сумму");
      return;
    }

    window.location.href = `/pay?amount=${amount}`;
  }
</script>

</body>
</html>
