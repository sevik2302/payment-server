<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AEY Digital Services — Оплата</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: #0b1220;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #e5e7eb;
    }

    .card {
      width: 380px;
      background: #111827;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .desc {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #374151;
      background: #0f172a;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #3b82f6;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .company {
      margin-top: 15px;
      font-size: 12px;
      text-align: center;
      color: #9ca3af;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Оплата доступа</h1>

    <div class="desc">
      AEY Digital Services<br>
      Оплата проходит через защищённый банк
    </div>

    <form action="/pay" method="GET">
      <input type="number" name="amount" placeholder="Сумма (₽)" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="text" name="phone" placeholder="Телефон (необязательно)">
      <button type="submit">Оплатить</button>
    </form>

    <div class="company">
      ИП Ряховский Всеволод Дмитриевич<br>
      ИНН 773575164300
    </div>
  </div>

</body>
</html>
