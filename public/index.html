<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сделка FKwallet</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: radial-gradient(circle at top, #f8fafc, #f1f5f9);
  color: #111827;
  overflow-x: hidden;
}

/* HEADER */
.header {
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #e5e7eb;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
}

/* HERO */
.hero {
  height: 85vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero-content {
  max-width: 520px;
}

.hero h1 {
  font-size: 44px;
  margin: 0;
}

.hero p {
  color: #6b7280;
  margin: 10px 0 20px;
}

.hero button {
  padding: 14px 26px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #facc15, #f59e0b);
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 10px 20px rgba(250,204,21,0.25);
}

/* FORM WRAP */
.wrapper {
  display: flex;
  justify-content: center;
  padding: 60px 16px;
}

.card {
  width: 420px;
  background: white;
  border-radius: 16px;
  padding: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.08);
}

/* INPUTS */
input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
  margin-top: 6px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #facc15, #f59e0b);
  font-weight: 600;
  cursor: pointer;
}

/* LIQUID OVERLAY */
.liquid {
  position: fixed;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, #facc15, #f59e0b);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 999;
  transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), 
              width 0.8s ease,
              height 0.8s ease,
              border-radius 0.8s ease;
}

/* EXPAND STATE */
.liquid.active {
  width: 3000px;
  height: 3000px;
  border-radius: 0%;
}

/* PAGE SWITCH */
.pay-form {
  opacity: 0;
  transform: translateY(20px);
  transition: 0.5s ease;
}

.pay-form.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<div class="header">
  <div>Сделка FKwallet</div>
  <div>Secure</div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Оплата сделки</h1>
    <p>Быстро и безопасно через банк</p>
    <button id="startBtn">Перейти к оплате</button>
  </div>
</section>

<!-- FORM -->
<div class="wrapper">
  <div class="card pay-form" id="form">

    <form action="/redirect.html" method="GET">

      <label>Сумма</label>
      <input type="number" name="amount" required>

      <label style="margin-top:12px;">Email</label>
      <input type="email" name="email">

      <button type="submit">Оплатить</button>

    </form>

  </div>
</div>

<!-- LIQUID LAYER -->
<div class="liquid" id="liquid"></div>

<script>
const btn = document.getElementById('startBtn');
const liquid = document.getElementById('liquid');
const form = document.getElementById('form');

btn.addEventListener('click', () => {

  // старт "жидкости"
  liquid.classList.add('active');

  // потом показываем форму
  setTimeout(() => {
    form.classList.add('show');
  }, 500);

});
</script>

</body>
</html>
