<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сделка FKwallet</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: radial-gradient(circle at top, #f8fafc, #f1f5f9);
  color: #111827;
}

/* HEADER */
.header {
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #e5e7eb;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
}

/* HERO */
.hero {
  height: 85vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero-content {
  max-width: 520px;
}

.hero h1 {
  font-size: 44px;
  margin: 0;
}

.hero p {
  color: #6b7280;
  margin: 10px 0 20px;
}

/* BUTTON */
.btn {
  padding: 14px 26px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #facc15, #f59e0b);
  font-weight: 600;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform .2s ease;
}

.btn:hover {
  transform: scale(1.03);
}

/* ripple glow */
.btn::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(255,255,255,0.6), transparent 60%);
  opacity: 0;
  transition: 0.4s;
}

.btn.active::after {
  opacity: 1;
}

/* FORM */
.wrapper {
  display: flex;
  justify-content: center;
  padding: 60px 16px;
}

.card {
  width: 420px;
  background: white;
  border-radius: 16px;
  padding: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.08);

  opacity: 0;
  transform: translateY(30px);
  transition: 0.6s ease;
  filter: blur(6px);
}

.card.show {
  opacity: 1;
  transform: translateY(0);
  filter: blur(0);
}

/* INPUTS */
input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
  margin-top: 6px;
  outline: none;
  transition: .2s;
}

input:focus {
  border-color: #facc15;
  box-shadow: 0 0 0 3px rgba(250,204,21,0.15);
}

/* BACKGROUND FADE EFFECT (IMPORTANT) */
body.dim {
  transition: 0.6s ease;
}

body.dim .hero-content {
  filter: blur(6px);
  opacity: 0.3;
}

body.dim .header {
  opacity: 0.5;
}

</style>
</head>

<body>

<div class="header">
  <div>Сделка FKwallet</div>
  <div>Secure</div>
</div>

<section class="hero">
  <div class="hero-content">

    <h1>Оплата сделки</h1>
    <p>Плавный банковский переход</p>

    <button class="btn" id="btn">
      Перейти к оплате
    </button>

  </div>
</section>

<div class="wrapper">
  <div class="card" id="card">

    <div style="font-size:18px;font-weight:600;margin-bottom:10px;">
      Оплата
    </div>

    <label>Сумма</label>
    <input type="number">

    <label style="margin-top:12px;">Email</label>
    <input type="email">

  </div>
</div>

<script>
const btn = document.getElementById('btn');
const card = document.getElementById('card');

btn.addEventListener('click', () => {

  // визуальный эффект кнопки
  btn.classList.add('active');

  // затемнение фона (как банковский transition)
  document.body.classList.add('dim');

  // показать форму
  setTimeout(() => {
    card.classList.add('show');
  }, 300);

});
</script>

</body>
</html>
