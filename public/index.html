<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оплата</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    padding: 30px;
    border-radius: 16px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    animation: fadeIn 0.5s ease;
}

h1 {
    font-size: 20px;
    margin-bottom: 20px;
    font-weight: 600;
}

input {
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: white;
    outline: none;
    font-size: 15px;
}

input:focus {
    background: rgba(255,255,255,0.12);
}

button {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: translateY(-1px);
}

/* toggle */
.toggle {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    font-size: 14px;
}

.switch {
    position: relative;
    width: 42px;
    height: 22px;
}

.switch input {
    display: none;
}

.slider {
    position: absolute;
    background: #374151;
    border-radius: 20px;
    top:0;left:0;right:0;bottom:0;
    transition: .3s;
}

.slider:before {
    content:"";
    position:absolute;
    height:16px;
    width:16px;
    left:3px;
    top:3px;
    background:white;
    border-radius:50%;
    transition:.3s;
}

input:checked + .slider {
    background:#22c55e;
}

input:checked + .slider:before {
    transform:translateX(20px);
}

.hidden {
    display: none;
}

/* info text */
.info {
    font-size: 12px;
    opacity: 0.6;
    margin-top: 12px;
    line-height: 1.5;
}

/* animation */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
<h1>Оплата</h1>

<form action="/create-payment" method="POST">

<input type="number" name="amount" placeholder="Введите сумму" required>

<div class="toggle">
    <span>Получить чек</span>
    <label class="switch">
        <input type="checkbox" id="toggleEmail">
        <span class="slider"></span>
    </label>
</div>

<div id="emailField" class="hidden">
    <input type="email" name="email" placeholder="Email для чека">
</div>

<button type="submit">Оплатить</button>

<div class="info">
Платёж обрабатывается через защищённое соединение<br>
Подтверждение оплаты выполняется в приложении банка
</div>

<div id="receiptInfo" class="info hidden">
Чек будет отправлен на указанный email
</div>

</form>
</div>

<script>
const toggle = document.getElementById('toggleEmail');
const emailField = document.getElementById('emailField');
const receiptInfo = document.getElementById('receiptInfo');

toggle.addEventListener('change', () => {
    emailField.classList.toggle('hidden', !toggle.checked);
    receiptInfo.classList.toggle('hidden', !toggle.checked);
});
</script>

</body>
</html>
