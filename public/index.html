<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сделка FKwallet</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: radial-gradient(circle at top, #f8fafc, #f1f5f9);
  color: #111827;
}

/* HEADER */
.header {
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #e5e7eb;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}

.logo { font-weight: 600; }
.secure { font-size: 13px; color: #6b7280; }

/* HERO */
.hero {
  height: 85vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero-content {
  max-width: 520px;
  position: relative;
}

.hero h1 {
  font-size: 44px;
  margin: 0;
}

.hero p {
  color: #6b7280;
  margin: 10px 0 20px;
}

/* 🔥 MORPH BUTTON */
.morph-btn {
  padding: 14px 26px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #facc15, #f59e0b);
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(250,204,21,0.25);
  transition: transform .2s ease;
}

.morph-btn:hover {
  transform: scale(1.03);
}

/* WRAPPER */
.wrapper {
  display: flex;
  justify-content: center;
  padding: 80px 16px;
}

/* CARD */
.card {
  width: 420px;
  background: white;
  border-radius: 16px;
  padding: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.08);

  opacity: 0;
  transform: translateY(40px);
  transition: 0.6s ease;
}

/* reveal state */
.card.show {
  opacity: 1;
  transform: translateY(0);
}

/* INPUTS */
input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
  margin-top: 6px;
}

/* 🔥 MORPH LAYER */
.morph {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: transparent;
  pointer-events: none;
  z-index: 999;
}

/* это “жидкость” */
.morph::before {
  content: "";
  position: absolute;
  top: var(--y, 50%);
  left: 50%;
  transform: translate(-50%, -50%);
  width: 180px;
  height: 60px;
  border-radius: 999px;
  background: linear-gradient(135deg, #facc15, #ffffff);
  transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
  filter: blur(0px);
}

/* active state = растекание */
.morph.active::before {
  width: 300vw;
  height: 300vh;
  border-radius: 0;
  filter: blur(0px);
  background: white;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 40px;
  font-size: 12px;
  color: #9ca3af;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">Сделка FKwallet</div>
  <div class="secure">Безопасная оплата</div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">

    <h1>Оплата сделки</h1>
    <p>Плавный банковский переход</p>

    <button class="morph-btn" id="btn">
      Перейти к оплате
    </button>

  </div>
</section>

<!-- PAYMENT -->
<div class="wrapper">
  <div class="card" id="card">

    <div style="font-size:18px;font-weight:600;margin-bottom:4px;">Оплата</div>
    <div style="font-size:13px;color:#6b7280;margin-bottom:20px;">
      Введите данные
    </div>

    <label>Сумма</label>
    <input type="number" placeholder="Введите сумму">

    <label style="margin-top:12px;">Email</label>
    <input type="email" placeholder="example@mail.com">

  </div>
</div>

<div class="footer">
AEY Digital Services
</div>

<!-- MORPH LAYER -->
<div class="morph" id="morph"></div>

<script>
const btn = document.getElementById('btn');
const morph = document.getElementById('morph');
const card = document.getElementById('card');

btn.addEventListener('click', () => {

  const rect = btn.getBoundingClientRect();

  // позиция кнопки → точка старта жидкости
  morph.style.setProperty('--y', rect.top + 'px');

  // активируем "жидкость"
  morph.classList.add('active');

  // через чуть-чуть показываем форму
  setTimeout(() => {
    card.classList.add('show');
  }, 400);

});
</script>

</body>
</html>
