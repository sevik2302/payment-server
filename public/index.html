<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сделка FKwallet</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: #f8f9f6;
  color: #111827;
}

/* header */
.header {
  background: #ffffff;
  border-bottom: 1px solid #e5e7eb;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;

  animation: fadeIn 0.6s ease;
}

.logo {
  font-weight: 600;
  font-size: 16px;
}

.secure {
  font-size: 13px;
  color: #6b7280;
}

/* wrapper */
.wrapper {
  display: flex;
  justify-content: center;
  padding: 80px 16px;
}

/* card */
.card {
  width: 420px;
  background: #ffffff;
  border-radius: 16px;
  padding: 30px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.06);

  animation: smoothIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-4px);
}

/* titles */
.title {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 4px;
}

.subtitle {
  font-size: 13px;
  color: #6b7280;
  margin-bottom: 24px;
}

/* inputs */
.input-group {
  margin-bottom: 16px;
}

label {
  display: block;
  font-size: 13px;
  margin-bottom: 6px;
  color: #374151;
}

input {
  width: 100%;
  padding: 13px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
  font-size: 14px;
  outline: none;

  transition: all 0.2s ease;
}

input:focus {
  border-color: #facc15;
  box-shadow: 0 0 0 3px rgba(250,204,21,0.2);
  transform: scale(1.01);
}

/* toggle */
.toggle {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  font-size: 14px;
}

.switch {
  position: relative;
  width: 42px;
  height: 22px;
}

.switch input { display:none; }

.slider {
  position: absolute;
  background: #e5e7eb;
  border-radius: 20px;
  top:0;left:0;right:0;bottom:0;
  transition:.3s;
}

.slider:before {
  content:"";
  position:absolute;
  height:16px;
  width:16px;
  left:3px;
  top:3px;
  background:white;
  border-radius:50%;
  transition:.3s;
}

input:checked + .slider {
  background:#facc15;
}

input:checked + .slider:before {
  transform:translateX(20px);
}

/* плавное появление email */
.hidden {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: all 0.3s ease;
}

.show {
  max-height: 80px;
  opacity: 1;
}

/* button */
button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;

  background: #facc15;
  color: #000;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;

  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

button:hover {
  transform: translateY(-2px) scale(1.02);
  background: #eab308;
}

button:active {
  transform: scale(0.97);
}

/* info */
.info {
  font-size: 12px;
  color: #6b7280;
  margin-top: 14px;
  line-height: 1.5;
}

/* footer */
.footer {
  text-align: center;
  margin-top: 30px;
  font-size: 12px;
  color: #9ca3af;
}

/* animations */
@keyframes smoothIn {
  from {
    opacity: 0;
    transform: translateY(25px) scale(0.98);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">Сделка FKwallet</div>
  <div class="secure">Безопасная оплата</div>
</div>

<div class="wrapper">
  <div class="card">

    <div class="title">Оплата</div>
    <div class="subtitle">Введите данные для проведения платежа</div>

    <form action="/pay" method="GET">

      <div class="input-group">
        <label>Сумма</label>
        <input type="number" name="amount" required placeholder="Введите сумму">
      </div>

      <div class="toggle">
        <span>Отправить чек</span>
        <label class="switch">
          <input type="checkbox" id="toggleEmail">
          <span class="slider"></span>
        </label>
      </div>

      <div id="emailField" class="hidden input-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="example@mail.com">
      </div>

      <button type="submit" id="payBtn">Оплатить</button>

      <div class="info">
        Платёж обрабатывается через защищённое соединение<br>
        Подтверждение выполняется в приложении банка
      </div>

      <div id="receiptInfo" class="info hidden">
        Чек будет отправлен на указанный email
      </div>

    </form>

  </div>
</div>

<div class="footer">
AEY Digital Services • ИП Ряховский В.Д.
</div>

<script>
const toggle = document.getElementById('toggleEmail');
const emailField = document.getElementById('emailField');
const receiptInfo = document.getElementById('receiptInfo');

toggle.addEventListener('change', () => {
  emailField.classList.toggle('show');
  receiptInfo.classList.toggle('show');
});

/* кнопка как у финтеха */
const btn = document.getElementById('payBtn');
btn.addEventListener('click', () => {
  btn.innerText = 'Обработка...';
  btn.style.opacity = '0.7';
});
</script>

</body>
</html>
