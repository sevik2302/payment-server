<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оплата</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: #0a0f1c;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.wrap {
  display: flex;
  gap: 60px;
  align-items: center;
  max-width: 900px;
}

.left {
  max-width: 320px;
}

.left h2 {
  font-size: 26px;
  margin-bottom: 10px;
}

.left p {
  color: #94a3b8;
  font-size: 14px;
  line-height: 1.5;
}

.card {
  width: 380px;
  background: #111827;
  padding: 40px;
  border-radius: 16px;
  box-shadow: 0 40px 100px rgba(0,0,0,0.7);
}

input {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #1f2937;
  background: #020617;
  color: #fff;
  outline: none;
  transition: 0.2s;
}

input:focus {
  border-color: #22c55e;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  font-weight: 600;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.meta {
  margin-top: 15px;
  font-size: 11px;
  color: #64748b;
  text-align: center;
}

.company {
  margin-top: 15px;
  font-size: 11px;
  color: #64748b;
  text-align: center;
  line-height: 1.4;
}

@media (max-width: 900px) {
  .wrap { flex-direction: column; }
}
</style>
</head>

<body>

<div class="wrap">

  <div class="left">
    <h2>Оплата</h2>
    <p>
      Безопасная оплата через защищённый банковский шлюз.<br><br>
      Данные передаются по зашифрованному соединению и не сохраняются.
    </p>
  </div>

  <div class="card">

    <!-- 🔥 ВАЖНО: обычная HTML форма -->
    <form action="/pay" method="GET">
      <input type="number" name="amount" placeholder="Сумма (₽)" required>
      <input type="email" name="email" placeholder="Email для чека" required>
      <input type="text" name="phone" placeholder="Телефон (необязательно)">

      <button type="submit">Оплатить</button>
    </form>

    <div class="meta">🔒 Соединение защищено</div>

    <div class="company">
      AEY Digital Services<br>
      ИП Ряховский Всеволод Дмитриевич<br>
      ИНН 773575164300
    </div>

  </div>

</div>

</body>
</html>
