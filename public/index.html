<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сделка FKwallet</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #f5f7fa;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* верхняя панель */
.header {
    background: white;
    padding: 16px 24px;
    border-bottom: 1px solid #e5e7eb;
    font-weight: 600;
    font-size: 16px;
}

/* центр */
.wrapper {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* карточка */
.container {
    background: white;
    padding: 28px;
    border-radius: 12px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

/* заголовок */
h1 {
    font-size: 18px;
    margin-bottom: 20px;
}

/* поля */
.input-group {
    margin-bottom: 16px;
}

label {
    display: block;
    font-size: 13px;
    margin-bottom: 6px;
    color: #374151;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    font-size: 14px;
    outline: none;
}

input:focus {
    border-color: #facc15;
}

/* кнопка */
button {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: none;
    background: #facc15;
    color: black;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #eab308;
}

/* тумблер */
.toggle {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    font-size: 14px;
}

.switch {
    position: relative;
    width: 42px;
    height: 22px;
}

.switch input {
    display: none;
}

.slider {
    position: absolute;
    background: #d1d5db;
    border-radius: 20px;
    top:0;left:0;right:0;bottom:0;
    transition: .3s;
}

.slider:before {
    content:"";
    position:absolute;
    height:16px;
    width:16px;
    left:3px;
    top:3px;
    background:white;
    border-radius:50%;
    transition:.3s;
}

input:checked + .slider {
    background:#facc15;
}

input:checked + .slider:before {
    transform:translateX(20px);
}

.hidden {
    display: none;
}

/* инфо */
.info {
    font-size: 12px;
    color: #6b7280;
    margin-top: 14px;
    line-height: 1.5;
}

/* футер */
.footer {
    text-align: center;
    font-size: 12px;
    color: #9ca3af;
    padding: 16px;
}
</style>
</head>

<body>

<div class="header">
    Оплата
</div>

<div class="wrapper">
<div class="container">

<h1>Введите данные для оплаты</h1>

<form action="/create-payment" method="POST">

<div class="input-group">
    <label>Сумма</label>
    <input type="number" name="amount" placeholder="Введите сумму" required>
</div>

<div class="toggle">
    <span>Отправить чек</span>
    <label class="switch">
        <input type="checkbox" id="toggleEmail">
        <span class="slider"></span>
    </label>
</div>

<div id="emailField" class="hidden input-group">
    <label>Email</label>
    <input type="email" name="email" placeholder="example@mail.com">
</div>

<button type="submit">Оплатить</button>

<div class="info">
Платёж обрабатывается через защищённое соединение<br>
Подтверждение выполняется в приложении банка
</div>

<div id="receiptInfo" class="info hidden">
Чек будет отправлен на указанный email
</div>

</form>
</div>
</div>

<div class="footer">
© Платёжный сервис
</div>

<script>
const toggle = document.getElementById('toggleEmail');
const emailField = document.getElementById('emailField');
const receiptInfo = document.getElementById('receiptInfo');

toggle.addEventListener('change', () => {
    emailField.classList.toggle('hidden', !toggle.checked);
    receiptInfo.classList.toggle('hidden', !toggle.checked);
});
</script>

</body>
</html>
