<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Payment</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #fff;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  font-size: 13px;
  color: #94a3b8;
}

.header strong {
  color: #fff;
}

/* CENTER */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: calc(100vh - 70px);
}

/* CARD */
.card {
  width: 420px;
  background: rgba(17,24,39,0.95);
  backdrop-filter: blur(10px);
  border-radius: 18px;
  padding: 40px;
  box-shadow: 0 40px 120px rgba(0,0,0,0.9);
}

/* BADGE */
.badge {
  display: inline-block;
  padding: 6px 10px;
  border-radius: 8px;
  background: rgba(34,197,94,0.1);
  color: #22c55e;
  font-size: 12px;
  margin-bottom: 15px;
}

/* TITLE */
.title {
  font-size: 20px;
  margin-bottom: 5px;
}

.subtitle {
  font-size: 13px;
  color: #9ca3af;
  margin-bottom: 25px;
}

/* INPUTS */
.input-group {
  margin-bottom: 14px;
}

label {
  display: block;
  font-size: 12px;
  color: #94a3b8;
  margin-bottom: 4px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #1f2937;
  background: #020617;
  color: #fff;
  font-size: 14px;
  outline: none;
  transition: 0.2s;
}

input:focus {
  border-color: #22c55e;
  box-shadow: 0 0 0 2px rgba(34,197,94,0.2);
}

/* BUTTON */
button {
  width: 100%;
  padding: 15px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-1px);
  box-shadow: 0 10px 25px rgba(34,197,94,0.35);
}

/* INFO BLOCK */
.info {
  margin-top: 20px;
  font-size: 12px;
  color: #64748b;
  text-align: center;
  line-height: 1.5;
}

/* FOOTER */
.footer {
  margin-top: 18px;
  font-size: 11px;
  color: #64748b;
  text-align: center;
  line-height: 1.4;
}

/* MOBILE */
@media (max-width: 500px) {
  .card {
    width: 100%;
    border-radius: 0;
    height: 100vh;
  }

  .container {
    align-items: stretch;
  }
}
</style>
</head>

<body>

<div class="header">
  <div><strong>AEY Digital Services</strong></div>
  <div>Secure checkout</div>
</div>

<div class="container">

  <div class="card">

    <div class="badge">🔒 Защищённый платёж</div>

    <div class="title">Оплата</div>
    <div class="subtitle">
      Введите сумму и данные для получения чека
    </div>

    <!-- 💥 ФОРМА -->
    <form action="/pay" method="GET">

      <div class="input-group">
        <label>Сумма</label>
        <input type="number" name="amount" placeholder="Например 1000" required min="1">
      </div>

      <div class="input-group">
        <label>Email (чек)</label>
        <input type="email" name="email" placeholder="example@mail.com" required>
      </div>

      <div class="input-group">
        <label>Телефон</label>
        <input type="text" name="phone" placeholder="+7 (999) 999-99-99">
      </div>

      <button type="submit">Оплатить</button>

    </form>

    <div class="info">
      Платёж обрабатывается через защищённый банковский шлюз.<br>
      Данные не сохраняются и передаются в зашифрованном виде.
    </div>

    <div class="footer">
      AEY Digital Services<br>
      ИП Ряховский Всеволод Дмитриевич<br>
      ИНН 773575164300
    </div>

  </div>

</div>

</body>
</html>
