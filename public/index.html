<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Payment</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #fff;
}

/* CANVAS */
#bg {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  font-size: 13px;
  color: #94a3b8;
}
.header strong { color: #fff; }

/* LAYOUT */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: calc(100vh - 70px);
}

/* CARD */
.card {
  width: 420px;
  background: rgba(17,24,39,0.95);
  backdrop-filter: blur(10px);
  border-radius: 18px;
  padding: 40px;
  box-shadow: 0 40px 120px rgba(0,0,0,0.9);
}

/* BADGE */
.badge {
  display: inline-block;
  padding: 6px 10px;
  border-radius: 8px;
  background: rgba(34,197,94,0.1);
  color: #22c55e;
  font-size: 12px;
  margin-bottom: 15px;
}

/* TEXT */
.title { font-size: 20px; }
.subtitle {
  font-size: 13px;
  color: #9ca3af;
  margin-bottom: 25px;
}

/* INPUTS */
.input-group { margin-bottom: 14px; }

label {
  display: block;
  font-size: 12px;
  color: #94a3b8;
  margin-bottom: 4px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #1f2937;
  background: #020617;
  color: #fff;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 15px;
  border-radius: 10px;
  border: none;

  /* сделали более заметный градиент */
  background: linear-gradient(135deg, #22c55e, #16a34a);

  /* ТЕКСТ БЕЛЫЙ (не синий) */
  color: #ffffff;

  font-size: 15px;
  font-weight: 600;
  cursor: pointer;

  transition: 0.2s;
}

/* hover эффект */
button:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 15px 35px rgba(34,197,94,0.4);
}

/* TRUST */
.trust {
  margin-top: 20px;
  font-size: 12px;
  color: #cbd5f5;
  text-align: center;
}

/* FOOTER */
.footer {
  margin-top: 15px;
  font-size: 11px;
  color: #64748b;
  text-align: center;
}

/* MOBILE */
@media (max-width: 500px) {
  .card {
    width: 100%;
    border-radius: 0;
    height: 100vh;
  }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="header">
  <div><strong>AEY Digital Services</strong></div>
  <div>Secure payment</div>
</div>

<div class="container">

  <div class="card">

    <div class="badge">🔒 Защищённый платёж</div>

    <div class="title">Оплата</div>
    <div class="subtitle">Введите сумму и email</div>

    <form action="/pay" method="GET">

      <div class="input-group">
        <label>Сумма</label>
        <input type="number" name="amount" required placeholder="Укажите сумму">
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="Email для чека">
      </div>

      <button type="submit">Оплатить</button>

    </form>

    <div class="trust">
      ✔️ Райффайзенбанк<br>
      ✔️ Электронный чек<br>
      ✔️ SSL защита
    </div>

    <div class="footer">
      AEY Digital Services<br>
      ИП Ряховский В.Д.
    </div>

  </div>

</div>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.3,
    dx: (Math.random() - 0.5) * 0.4,
    dy: (Math.random() - 0.5) * 0.4
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.dx;
    p.y += p.dy;

    if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.dy *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.15)";
    ctx.fill();
  });
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
