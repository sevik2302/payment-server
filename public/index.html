<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Оплата</title>
</head>
<body>

<form action="/pay" method="GET">
  <input type="number" name="amount" placeholder="Сумма" required />

  <br><br>

  <label>
    <input type="checkbox" id="needReceipt" />
    Получить чек
  </label>

  <div id="receiptFields" style="display:none;">
    <input type="email" name="email" placeholder="Email" />
    <input type="text" name="phone" placeholder="Телефон" />
  </div>

  <br>
  <button type="submit">Оплатить</button>
</form>

<script>
  const checkbox = document.getElementById("needReceipt");
  const fields = document.getElementById("receiptFields");

  checkbox.addEventListener("change", () => {
    fields.style.display = checkbox.checked ? "block" : "none";
  });
</script>

</body>
</html>
